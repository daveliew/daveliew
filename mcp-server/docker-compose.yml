version: '3.8'

services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    image: daveliew/efficient-mcp-server:latest
    container_name: efficient-mcp-server
    environment:
      - NODE_ENV=production
      - LOG_LEVEL=info
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
    volumes:
      # Mount data directory for state persistence
      - ./data:/app/.data
    restart: unless-stopped
    # Note: MCP servers use stdio transport, not network ports
    # To use with Claude Desktop, configure in claude_desktop_config.json

  # Development service with hot reload
  mcp-server-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: efficient-mcp-server-dev
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY}
    volumes:
      - ./src:/app/src
      - ./data:/app/.data
      - /app/node_modules
    command: npm run dev
    restart: unless-stopped
